name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Gradle environment
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Regenerate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1 --distribution-type bin
          chmod +x gradlew

      - name: Decode or Generate Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore || openssl base64 -d -A -in debug.keystore.base64 -out debug.keystore
          else
            echo "debug.keystore.base64 not found, generating a fallback debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup fallback .env file
        run: |
          if [ -f ".env.example" ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Download MediaPipe Hand Landmarker Model
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/hand_landmarker.task https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task

      - name: Build Debug APK
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API: ${{ secrets.TAVILY_API }}
          MEM0_API: ${{ secrets.MEM0_API }}
          PICOVOICE_ACCESS_KEY: ${{ secrets.PICOVOICE_ACCESS_KEY }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          GCLOUD_GATEWAY_PICOVOICE_KEY: ${{ secrets.GCLOUD_GATEWAY_PICOVOICE_KEY }}
          GCLOUD_GATEWAY_URL: ${{ secrets.GCLOUD_GATEWAY_URL }}
          GCLOUD_PROXY_URL: ${{ secrets.GCLOUD_PROXY_URL }}
          GCLOUD_PROXY_URL_KEY: ${{ secrets.GCLOUD_PROXY_URL_KEY }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Blurr-Voice-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
